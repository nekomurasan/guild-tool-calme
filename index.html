<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrownDust Ⅱ Calme Guild Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a3050;
    --bg-card: #253F60;
    --gold: #D8B35D;
    --gold-soft: #e8cd8f;
    --text: #F3F5F8;
    --text-dim: #B9C6D6;
    --border: #3E5B80;
  }
  body {
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 40px 20px;
    color: var(--text);
  }
  .wrap { max-width: 800px; margin: 0 auto; }
  .titleBlock { text-align: center; margin-bottom: 8px; }
  h1 {
    font-family: 'Cinzel', serif;
    font-size: 36px; margin: 0; color: var(--gold); letter-spacing: 1px;
    font-weight: 700;
  }
  .subtitle {
    font-family: 'Cinzel', serif;
    font-size: 14px; color: var(--gold-soft); letter-spacing: 3px; margin-top: 8px;
    text-transform: uppercase; font-weight: 600; text-align: center;
  }
  .sub { color: var(--text-dim); font-size: 14px; text-align: center; margin: 16px 0 36px; }
  .tools {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 18px;
  }
  .tool-card {
    display: block;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.15s, transform 0.15s;
  }
  .tool-card:hover {
    border-color: var(--gold);
    transform: translateY(-2px);
  }
  .tool-card .tool-name {
    font-family: 'Cinzel', serif;
    font-size: 19px;
    color: var(--gold);
    font-weight: 700;
    margin-bottom: 8px;
  }
  .tool-card .tool-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
  }
  .tool-card.disabled {
    opacity: 0.45;
    cursor: default;
    pointer-events: none;
  }
  .tool-card .tool-status {
    display: inline-block;
    font-size: 11px;
    color: var(--gold-soft);
    border: 1px solid var(--gold-soft);
    border-radius: 10px;
    padding: 1px 8px;
    margin-top: 10px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="titleBlock">
    <h1>BrownDust Ⅱ Calme Guild Tool</h1>
  </div>
  <div class="subtitle">Guild Utility Suite</div>
  <div class="sub">ギルド運営に役立つツール集です。使いたいツールを選んでください。</div>

  <div class="tools">
    <a class="tool-card" href="equipment/index.html">
      <div class="tool-name">Elite Gear Database</div>
      <div class="tool-desc">専用装備・汎用装備の高等級所持者を、ギルドメンバーが自分で登録・共有できる装備管理ツール。</div>
    </a>

    <div class="tool-card disabled">
      <div class="tool-name">(準備中)</div>
      <div class="tool-desc">今後、ダメージ計算や理想パーティ提案など、別のツールをここに追加していく予定です。</div>
      <span class="tool-status">Coming soon</span>
    </div>
  </div>
</div>
</body>
</html>
